services:
  game:
    build: .
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgres://lastfortress:${DB_PASSWORD:?set DB_PASSWORD in .env}@db:5432/lastfortress
      TOKEN_SECRET: ${TOKEN_SECRET:?set TOKEN_SECRET in .env}
    depends_on:
      db:
        condition: service_healthy
    # Caddy (system service on :80/:443) fronts this and reverse-proxies
    # 212.180.120.69 -> localhost:8080. Bind to loopback only: not publicly
    # exposed, and never contends with Caddy for :80.
    ports:
      - "127.0.0.1:8080:8080"

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lastfortress
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: lastfortress
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lastfortress"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
